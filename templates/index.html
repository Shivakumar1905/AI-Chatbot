<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chat Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #2563eb;
            --blue-light: #eff6ff;
            --blue-mid: #bfdbfe;
            --blue-dark: #1d4ed8;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --text: #111827;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg { width: 20px; height: 20px; fill: white; }

        header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-800);
        }

        .online-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--gray-400);
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

        .welcome {
            margin: auto;
            text-align: center;
            max-width: 340px;
        }

        .welcome-icon {
            width: 56px;
            height: 56px;
            background: var(--blue-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .welcome-icon svg { width: 28px; height: 28px; fill: var(--blue); }

        .welcome h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 0.875rem;
            color: var(--gray-400);
            line-height: 1.6;
        }

        .message-row {
            display: flex;
            gap: 10px;
            max-width: 760px;
            width: 100%;
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-row.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        .bot-avatar {
            background: var(--blue);
            color: white;
        }

        .bot-avatar svg { width: 16px; height: 16px; fill: white; }

        .user-avatar {
            background: var(--gray-200);
            color: var(--gray-600);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.65;
            max-width: 640px;
        }

        .user .bubble {
            background: var(--blue);
            color: white;
            border-top-right-radius: 3px;
        }

        .bot .bubble {
            background: var(--white);
            border: 1px solid var(--gray-200);
            color: var(--gray-800);
            border-top-left-radius: 3px;
        }

        .bot .bubble p { margin: 4px 0; }
        .bot .bubble ul, .bot .bubble ol { padding-left: 18px; margin: 6px 0; }
        .bot .bubble li { margin: 3px 0; }
        .bot .bubble strong { color: var(--blue-dark); font-weight: 600; }
        .bot .bubble code {
            background: var(--gray-100);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: monospace;
        }
        .bot .bubble pre {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .bot .bubble pre code { background: none; padding: 0; }

        .thinking {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 14px 16px;
        }

        .thinking span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--blue-mid);
            animation: bounce 1.1s ease-in-out infinite;
        }

        .thinking span:nth-child(2) { animation-delay: 0.18s; background: #93c5fd; }
        .thinking span:nth-child(3) { animation-delay: 0.36s; background: var(--blue); }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .input-wrapper {
            padding: 16px 20px 20px;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            flex-shrink: 0;
        }

        .input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--gray-50);
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            padding: 10px 14px;
            max-width: 760px;
            margin: 0 auto;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-bar:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: var(--white);
        }

        #user-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            resize: none;
            height: 22px;
            line-height: 22px;
        }

        #user-input::placeholder { color: var(--gray-400); }

        #send-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }

        #send-btn:hover { background: var(--blue-dark); }
        #send-btn:active { transform: scale(0.94); }
        #send-btn svg { width: 16px; height: 16px; fill: white; }

        .hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--gray-400);
            margin-top: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
    </div>
    <h1>Chat Assistant</h1>
    <div class="online-badge">
        <div class="dot"></div>
        Online
    </div>
</header>

<div id="chat-box">
    <div class="welcome" id="welcome">
        <div class="welcome-icon">
            <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
        </div>
        <h2>How can I help you?</h2>
        <p>Ask me anything. I'll do my best to give you a clear and helpful answer.</p>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-bar">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <p class="hint">Press Enter to send</p>
</div>

<script>
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function addMessage(role, content, isMarkdown = false) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}-avatar`;

        if (role === 'bot') {
            avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>`;
        } else {
            avatar.textContent = 'U';
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = isMarkdown ? marked.parse(content) : escapeHtml(content);

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addThinking() {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = 'message-row bot';
        row.id = 'thinking-row';

        const avatar = document.createElement('div');
        avatar.className = 'avatar bot-avatar';
        avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble thinking';
        bubble.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        addMessage('user', message);
        input.value = '';
        addThinking();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            document.getElementById('thinking-row')?.remove();
            addMessage('bot', data.response, true);
        } catch (err) {
            document.getElementById('thinking-row')?.remove();
            addMessage('bot', 'Something went wrong. Please try again.');
        }
    }
</script>

</body>
</html>
